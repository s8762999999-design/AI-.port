<meta charset="UTF-8">

<style>
body {
    font-family: "Segoe UI", sans-serif;
    margin: 0;
    background: #f5f7fb;

    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* 一鍵按鈕 */
.open-all-btn {
    display: block;
    margin: 10px auto;
    padding: 12px 20px;
    font-size: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.open-all-btn:hover {
    background: #45a049;
}

/* 卡片區（修正高度問題） */
.container {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 180px));
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    height: 120px;
    width: 150px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    text-decoration: none;
    color: black;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.icon {
    font-size: 40px;
    margin-bottom: 10px;
}

/* Footer */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 14px;
    color: gray;
    background: #ffffff;
    border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<header>🚀 AI 工具入口</header>

<button onclick="openAllLinks()" class="open-all-btn">
🚀 一鍵打開全部

<script>
function openAllLinks() {

    if (!confirm("確定要開啟全部工具嗎？")) return;

    const links = [
        "https://mail.google.com/mail/u/0/#inbox",
        "https://gemini.google.com/app",
        "https://notebooklm.google.com/",
        "https://manus.im/",
        "https://chatgpt.com/",
        "https://grok.com/",
        "https://claude.ai/new",
        "https://chat.deepseek.com/sign_in",
        "https://www.perplexity.ai/",
        "https://labs.google/fx/zh/tools/flow",
        "https://s8762999999-design.github.io/",
        "https://htmlpreview.github.io/?https://gist.githubusercontent.com/s8762999999-design/c0c9bfbfeebf14638d477863302a59a4/raw/8cb1681bbe47e805d12a91fa2517722b7604da33/%25E8%2587%25A自製網頁DIY工具"
    ];

    const screenWidth = window.screen.availWidth;
    const screenHeight = window.screen.availHeight;

    const cols = 4;
    const rows = Math.ceil(links.length / cols);

    const winWidth = Math.floor(screenWidth / cols);
    const winHeight = Math.floor(screenHeight / rows);

    links.forEach((url, index) => {
        const col = index % cols;
        const row = Math.floor(index / cols);

        const left = col * winWidth;
        const top = row * winHeight;

        setTimeout(() => {
            window.open(
                url,
                "_blank",
                `width=${winWidth},height=${winHeight},left=${left},top=${top}`
            );
        }, index * 300);
    });
}
</script>
